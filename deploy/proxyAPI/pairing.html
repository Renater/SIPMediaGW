<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pairing</title>

<style>
  * { box-sizing: border-box; }

  body {
    font-family: monospace;
    background: #f9f9f9;
    margin: 0;
    padding: 2rem;
    display: flex;
    justify-content: center;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
  }

  /* LANG SWITCH */
  #lang-switch {
    margin-bottom: 1.5rem;
  }

  #lang-switch button {
    margin-right: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #bbb;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
  }

  #lang-switch button[disabled] {
    background: #e0e0e0;
    color: #888;
  }

  /* TITLE */
  h3 {
    font-size: 1.6em;
    margin-bottom: 1.2rem;
  }

  /* FORM */
  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input {
    font-size: 2em;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #bbb;
    background: #fff;
    text-align: center;
    letter-spacing: 0.25em;
    font-family: monospace;
  }

  button {
    font-size: 1.3em;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #bbb;
    background: white;
    cursor: pointer;
    font-family: monospace;
  }

  button:active {
    background: #e0e0e0;
    transform: scale(0.98);
  }

  #hint {
    margin-top: 12px;
    font-size: 0.9em;
    color: #888;
    text-align: center;
  }

  @media (max-width: 420px) {
    input { font-size: 1.6em; }
    h3 { font-size: 1.3em; }
  }
</style>
</head>

<body>

<div class="wrap">

  <!-- LANG -->
  <div id="lang-switch"></div>

  <!-- TITLE -->
  <h3 id="title">Enter pairing code</h3>

  <!-- FORM -->
  <form method="get" action="/interact" id="form">
    <input id="pairingCode" name="pairingCode" required />
    <button type="submit" id="btn">Submit</button>
  </form>

  <div id="hint">Enter the code shown on the device</div>

</div>

<script>
let lang = "fr";

const texts = {
  fr: {
    title: "Entrer le code de jumelage",
    placeholder: "Code de jumelage",
    button: "Valider",
    hint: "Entrez le code affiché sur l'appareil",
    switch_en: "English"
  },
  en: {
    title: "Enter pairing code",
    placeholder: "Pairing code",
    button: "Submit",
    hint: "Enter the code shown on the device",
    switch_fr: "Français"
  }
};

function render() {
  const sw = document.getElementById("lang-switch");

  sw.innerHTML = `
    <button onclick="setLang('fr')" ${lang === 'fr' ? 'disabled' : ''}>🇫🇷 Français</button>
    <button onclick="setLang('en')" ${lang === 'en' ? 'disabled' : ''}>🇬🇧 English</button>
  `;

  document.getElementById("title").textContent = texts[lang].title;
  document.getElementById("pairingCode").placeholder = texts[lang].placeholder;
  document.getElementById("btn").textContent = texts[lang].button;
  document.getElementById("hint").textContent = texts[lang].hint;
}

function setLang(l) {
  lang = l;
  render();
}

/* UX improvements */
const input = document.getElementById("pairingCode");
const form = document.getElementById("form");

input.focus();

input.addEventListener("input", () => {
  input.placeholder = "";
});

form.addEventListener("submit", () => {
  input.value = input.value.trim();
});

render();
</script>

</body>
</html>
