[pytest]
pythonpath = .
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short 
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80

[coverage:run]
source = .
omit = 
    test/*
    venv/*
    */site-packages/*