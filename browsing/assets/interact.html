<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Keyboard Gateway</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: monospace;
    padding: 1.25rem;
    background: #f9f9f9;
    margin: 0;
  }
  #lang-switch {
    margin-bottom: 1em;
  }
  #lang-switch button {
    margin-right: 8px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  #lang-switch button[disabled] {
    background: #e0e0e0;
    color: #888;
    cursor: default;
  }
  #input-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 1em;
  }
  #input-label {
    font-size: 1em;
    white-space: nowrap;
  }
  #key-capture {
    flex: 1;
    min-width: 100px;
    font-size: 1.3em;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: #fff;
    letter-spacing: 0.2em;
    font-family: monospace;
  }
  .key {
    height: 40px;
    padding: 0 14px;
    border: 1px solid #bbb;
    border-radius: 6px;
    background: white;
    font-size: 13px;
    cursor: pointer;
    font-family: monospace;
    white-space: nowrap;
  }
  .key:active { background: #e0e0e0; transform: scale(0.94); }

  #action-btns {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #status {
    font-size: 12px;
    color: #888;
    margin-bottom: 1rem;
    min-height: 18px;
  }

  #menu-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1em;
  }

  .menu-key {
    background: #f0f8ff;
    border: 1px solid #aee;
    color: #222;
    font-size: 14px;
    width: 100%;
    height: auto;
    min-height: 40px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: left;
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  #log {
    font-size: 11px;
    background: #eee;
    border-radius: 6px;
    padding: 10px;
    max-height: 100px;
    overflow-y: auto;
    word-break: break-all;
  }

  @media (max-width: 420px) {
    #key-capture { font-size: 1.1em; }
    .menu-key {
    #lang-switch button { padding: 4px 8px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="kb-wrap">
  <div id="lang-switch"></div>
  <div id="input-row">
    <label for="key-capture" id="input-label">Type here:</label>
    <input id="key-capture" autocomplete="off" />
    <div id="action-btns">
      <button id="btn-enter" type="button" class="key" tabindex="-1">Enter</button>
      <button id="btn-del" type="button" class="key" tabindex="-1">←</button>
    </div>
  </div>
  <div id="status">Ready</div>
  <div id="menu-options"></div>
  <div id="log">Waiting for input...</div>
</div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const gwId = urlParams.get('gwId');

let pollingStarted = false;
let ivrMenus = {};
let webrtcDomains = {};
let browsingName = '';
let menuOptions = [];
let menuDisplayed = false;
let currentLang = 'en';

function renderLangSwitch() {
  const langDiv = document.getElementById('lang-switch');
  langDiv.innerHTML = `
    <button onclick="setMenuLang('fr')" ${currentLang === 'fr' ? 'disabled' : ''}>🇫🇷 Français</button>
    <button onclick="setMenuLang('en')" ${currentLang === 'en' ? 'disabled' : ''}>🇬🇧 English</button>
  `;
  document.getElementById('input-label').textContent = currentLang === 'fr' ? 'Tapez ici :' : 'Type here:';
  document.getElementById('btn-enter').textContent = currentLang === 'fr' ? 'Entrée' : 'Enter';
}
function setMenuLang(lang) {
  currentLang = lang;
  renderLangSwitch();
  if (menuDisplayed) {
    renderMenuOptions();
  } else if (browsingName) {
    // If a domain is already selected, do not return to the domain list.
    // If options are already present, display them in the correct language;
    // otherwise, display the input field.
    if (menuOptions && menuOptions.length) {
      renderMenuOptions();
      menuDisplayed = true;
      const inputRow = document.getElementById('input-row');
      if (inputRow) inputRow.style.display = 'flex';
    } else {
      showInputAndPrepareMenu(browsingName);
    }
  } else {
    renderDomainButtons();
  }
}

const capture = document.getElementById('key-capture');
capture.placeholder = '••••';

function captureReset() {
  capture.value = '';
  capture.placeholder = '••••';
}

capture.addEventListener('input', function() {
  this.placeholder = this.value ? '' : '••••';
});
capture.addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (this.value.length > 0) {
      await sendString(this.value + '#');
      await captureReset();
      await setTimeout(() => sendKey('#'), 450);
    }
  }
});

function apiUrl(path) {
  const url = `${window.location.protocol}//${window.location.hostname}${window.location.port ? ':' + window.location.port : ''}`;
  return `${url.replace(/\/$/, '')}${path}`;
}

async function sendKey(param1) {
  const status = document.getElementById('status');
  const log = document.getElementById('log');
  const payload = { gw_id: gwId, payload: { command: "sendKey", param1 } };
  status.textContent = `Sending: ${param1}`;
  log.textContent = `→ POST ${apiUrl('/command')}\n   ${JSON.stringify(payload)}`;
  try {
    const res = await fetch(apiUrl('/command'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const text = await res.text();
    status.textContent = `✓ ${res.status} — key: ${param1}`;
    log.textContent += `\n← ${res.status} ${text.slice(0, 120)}`;
    if ((param1 === '#' || param1 === 'Enter') && !pollingStarted) { pollingStarted = true; setTimeout(checkGwStatus, 1000); }
  } catch(e) {
    status.textContent = `✗ Error: ${e.message}`;
    log.textContent += `\n← ${e.message}`;
  }
}

async function sendString(str) {
  const status = document.getElementById('status');
  const log = document.getElementById('log');
  const payload = { gw_id: gwId, payload: { command: "sendString", param1: str } };
  status.textContent = `Sending: ${str}`;
  log.textContent = `→ POST ${apiUrl('/command')}\n   ${JSON.stringify(payload)}`;
  try {
    const res = await fetch(apiUrl('/command'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const text = await res.text();
    status.textContent = `✓ ${res.status} — string: ${str}`;
    log.textContent += `\n← ${res.status} ${text.slice(0, 120)}`;
    if (!pollingStarted) { pollingStarted = true; setTimeout(checkGwStatus, 1000); }
  } catch(e) {
    status.textContent = `✗ Error: ${e.message}`;
    log.textContent += `\n← ${e.message}`;
  }
}

async function fetchIvrConfigAndRestoreState() {
  if (!gwId) return;
  try {
    const res = await fetch(apiUrl('/ivrConfig') + `?gw_id=${encodeURIComponent(gwId)}`);
    const data = await res.json();
    ivrMenus = data.menus || {};
    webrtcDomains = data.webrtc_domains || {};
    renderLangSwitch();
    const statusRes = await fetch(apiUrl('/status') + `?gw_id=${encodeURIComponent(gwId)}`);
    if (!statusRes.ok) { renderDomainButtons(); return; }
    const statusData = await statusRes.json();
    let bn = statusData.data.browsing;
    let rn = statusData.data.room;
    if (rn && bn) {
      menuOptions = (ivrMenus[bn] && ivrMenus[bn].options) ? ivrMenus[bn].options : [];
      menuDisplayed = true;
      renderMenuOptions();
    } else {
      bn ? showInputAndPrepareMenu(bn) : renderDomainButtons();
    }
  } catch(e) {
    document.getElementById('status').textContent = "Error loading IVR config.";
  }
}

function renderDomainButtons() {
  const menuDiv = document.getElementById('menu-options');
  menuDiv.innerHTML = '';
  const domains = Object.entries(webrtcDomains);
  if (!domains.length) return;
  // hide the whole input row while rendering domain choices
  const inputRow = document.getElementById('input-row');
  if (inputRow) inputRow.style.display = 'none';

  const chooseLabel = currentLang === 'fr' ? 'Choisissez un service :' : 'Choose a service:';
  menuDiv.innerHTML = `<div style="margin-bottom:0.5em;width:100%;">${chooseLabel}</div>`;
  domains.forEach(([key, val], idx) => {
    const digit = (idx + 1).toString();
    const btn = document.createElement('button');
    btn.className = 'key menu-key';
    btn.textContent = `${digit}. ${val.name || key}`;
    btn.onclick = async () => { await sendKey(digit); await sendKey('#'); showInputAndPrepareMenu(key); };
    menuDiv.appendChild(btn);
  });
  document.getElementById('key-capture').disabled = !browsingName;
}

function showInputAndPrepareMenu(selectedDomainKey) {
  browsingName = selectedDomainKey;
  menuOptions = [];
  menuDisplayed = false;
  renderMenuOptions();
  // show the input row when preparing the menu / input
  const inputRow = document.getElementById('input-row');
  if (inputRow) inputRow.style.display = 'flex';

  document.getElementById('key-capture').disabled = false;
  document.getElementById('key-capture').focus();
}

async function checkGwStatus() {
  if (!gwId) return setTimeout(checkGwStatus, 2000);
  try {
    const statusRes = await fetch(apiUrl('/status') + `?gw_id=${encodeURIComponent(gwId)}`);
    if (!statusRes.ok) { document.getElementById('status').textContent = `Gateway unreachable (code ${statusRes.status}) — Stopping polling.`; return; }
    const statusData = await statusRes.json();
    if (statusData.data?.gw_state === "down") { document.getElementById('status').textContent = `Gateway down ("exited") — Stopping polling.`; return; }
    let bn = statusData.data.browsing;
    let rn = statusData.data.room;
    if (rn && bn && !menuDisplayed) {
      menuOptions = (ivrMenus[bn] && ivrMenus[bn].options) ? ivrMenus[bn].options : [];
      renderMenuOptions();
      menuDisplayed = true;
    } else {
      bn ? showInputAndPrepareMenu(bn) : (menuOptions = [], menuDisplayed = false, renderDomainButtons());
      setTimeout(checkGwStatus, 2000);
    }
  } catch(e) {
    document.getElementById('status').textContent = `Status error — Stopping polling.`;
  }
}

function renderMenuOptions() {
  const menuDiv = document.getElementById('menu-options');
  menuDiv.innerHTML = '';
  if (!menuOptions.length) return;
  menuOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'key menu-key';
    btn.innerHTML = `${getIcon(opt.icon)} ${opt[currentLang] || opt['en'] || ''}`;
    btn.onclick = () => sendKey(opt.dtmf);
    menuDiv.appendChild(btn);
  });
}

function getIcon(icon) {
  if (!icon) return '';
  return `<img src="${apiUrl('/icon')}/${icon}?gw_id=${encodeURIComponent(gwId)}" alt="" style="width:1.5em;height:1.5em;vertical-align:middle;">`;
}

document.addEventListener('DOMContentLoaded', fetchIvrConfigAndRestoreState);

document.getElementById('btn-enter').onclick = async () => {
  if (capture.value.length > 0) {
    await sendString(capture.value + '#');
    await captureReset();
    await setTimeout(() => sendKey('#'), 450);
  }
};
document.getElementById('btn-del').onclick = () => {
  sendKey('*');
};
</script>
</body>
</html>
